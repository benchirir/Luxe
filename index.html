                            <div style={styles.location}><span>📍</span><span>Nairobi • CBD</span><span>▼</span></div>
                        </div>
                        <input placeholder="🔍 Search products or stores..." value={search} onChange={e => setSearch(e.target.value)} style={styles.searchInput} />
                    </div>

                    <div style={styles.categoriesScroll}>
                        {CATEGORIES.map(cat => (
                            <div key={cat.id} style={styles.categoryChip(selectedCat === cat.id, cat.color)} onClick={() => setSelectedCat(cat.id)}>
                                <span style={styles.categoryIcon}>{cat.icon}</span>
                                <span style={styles.categoryName(selectedCat === cat.id)}>{cat.name}</span>
                            </div>
                        ))}
                    </div>

                    <div style={styles.section}>
                        <div style={styles.sectionHeader}>
                            <h2 style={styles.sectionTitle}>{selectedCat === 'all' ? '🛍️ All Products' : `${CATEGORIES.find(c => c.id === selectedCat)?.icon} ${CATEGORIES.find(c => c.id === selectedCat)?.name}`}</h2>
                            <span style={{color: COLORS.textMuted}}>{filtered.length} items</span>
                        </div>
                        <div style={styles.productGrid}>
                            {filtered.map(p => (
                                <div key={p.id} style={styles.productCard(hoveredCard === p.id)} onMouseEnter={() => setHoveredCard(p.id)} onMouseLeave={() => setHoveredCard(null)}>
                                    {p.badge && <span style={styles.badge(p.badgeColor)}>{p.badge}</span>}
                                    <img src={p.img} style={styles.productImage} alt={p.name} />
                                    <p style={styles.storeName}>{p.store}</p>
                                    <p style={styles.productName}>{p.name}</p>
                                    <div style={styles.rating}><span>⭐</span><span>{p.rating}</span></div>
                                    <p style={styles.productPrice}>KSh {p.price.toLocaleString()}</p>
                                    <div style={styles.deliveryRow}><span>🛵</span><span>{p.delivery}</span></div>
                                    <button onClick={() => addToCart(p)} style={styles.addButton}>+ Add to Cart</button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {cart.length > 0 && (
                        <div style={styles.cartBar}>
                            <div style={styles.cartPreview}>
                                <span>🛒 {cartCount} items</span>
                                <span style={{color: COLORS.primary, fontWeight: '700'}}>KSh {cartTotal.toLocaleString()}</span>
                            </div>
                            <a href={waMsg()} target="_blank" style={styles.checkoutButton}>💬 Checkout via WhatsApp</a>
                        </div>
                    )}

                    {popup && <div style={styles.popup}>{popup}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LuxeMart />);
    </script>
</body>
</html>
