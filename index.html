        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

        html {

        }
        
        body { 
            background: #0A0A0A;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        /* PWA Install Prompt Styles */
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1A1408 0%, #0D0A05 100%);
            border: 2px solid #C9A84C;
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
            animation: slideUp 0.4s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 480px;
            margin: 0 auto;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 4px; }
        
        /* Pull-to-refresh prevention for PWA */
        body {
            overscroll-behavior-y: contain;
        }
        
        /* Safe area insets for notched phones */
        #root {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);

        .location-dropdown {
            position: relative;
            display: inline-block;
        }
        .location-menu {
            position: absolute;
            top: 100%;
            right: 0;

            background: #1A1A1A;
            border: 1px solid #C9A84C;
            border-radius: 12px;
            padding: 8px;
            min-width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;

        .location-option {

            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;

        .location-option:hover {

        .location-option.selected {
            background: rgba(201, 168, 76, 0.2);
            border-left: 3px solid #C9A84C;
        }
        .location-option .city {

            color: #fff;
        }
        .location-option .delivery-badge {
            font-size: 11px;
            color: #10B981;
            margin-left: auto;

        /* Splash Screen Styles */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1408 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;

            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {

        }

    <!-- PWA Service Worker Registration -->
    <script>
        // Generate manifest dynamically
        const manifest = {
            name: "Luxe Mart",
            short_name: "Luxe Mart",
            description: "Premium Shopping • Delivery in Minutes",
            theme_color: "#0A0A0A",
            background_color: "#0A0A0A",
            display: "standalone",
            scope: "/",
            start_url: "/",
            orientation: "portrait",
            icons: [
                {
                    src: "https://cdn-icons-png.flaticon.com/512/869/869636.png",
                    sizes: "192x192",
                    type: "image/png",
                    purpose: "any maskable"
                },
                {
                    src: "https://cdn-icons-png.flaticon.com/512/869/869636.png",
                    sizes: "512x512",
                    type: "image/png",
                    purpose: "any maskable"
                }
            ],
            shortcuts: [
                {
                    name: "View Cart",
                    short_name: "Cart",
                    description: "View your shopping cart",
                    url: "/?cart=true",
                    icons: [{ src: "https://cdn-icons-png.flaticon.com/512/869/869636.png", sizes: "192x192" }]
                }
            ],
            categories: ["shopping", "lifestyle", "food"],
            screenshots: [],
            related_applications: [],
            prefer_related_applications: false
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const manifestURL = URL.createObjectURL(manifestBlob);
        document.getElementById('manifest-placeholder').href = manifestURL;
        
        // Hide splash screen after content loads
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 500);
                }
            }, 1500);
        });
        
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(function(registration) {
                        console.log('✅ PWA Service Worker registered with scope:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('⚠️ Service Worker registration failed:', error);
                        // Create inline service worker
                        createInlineServiceWorker();
                    });
            });
        }
        
        function createInlineServiceWorker() {
            const swContent = `
                const CACHE_NAME = 'luxe-mart-v1';
                const urlsToCache = [
                    '/',
                    '/index.html'
                ];
                
                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME)
                            .then(cache => cache.addAll(urlsToCache))
                    );
                });
                
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request)
                            .then(response => response || fetch(event.request))
                    );
                });
                
                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(cacheNames => {
                            return Promise.all(
                                cacheNames.filter(name => name !== CACHE_NAME)
                                    .map(name => caches.delete(name))
                            );
                        })
                    );
                });
            `;
            
            const blob = new Blob([swContent], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl);
        }
        
        // PWA Install Prompt
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install prompt after 3 seconds
            setTimeout(() => {
                showInstallPrompt();
            }, 3000);
        });
        
        function showInstallPrompt() {
            const promptDiv = document.createElement('div');
            promptDiv.className = 'install-prompt';
            promptDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 32px;">📱</span>
                    <div>
                        <div style="font-weight: 700; color: #C9A84C; margin-bottom: 4px;">Install Luxe Mart</div>
                        <div style="font-size: 12px; color: #888;">Get the app for faster shopping</div>
                    </div>
                </div>
                <button onclick="this.parentElement.remove(); window.installApp();" style="
                    background: #C9A84C;
                    color: #0A0A0A;
                    border: none;
                    padding: 10px 18px;
                    border-radius: 20px;
                    font-weight: 700;
                    font-size: 13px;
                    cursor: pointer;
                ">Install</button>
            `;
            document.body.appendChild(promptDiv);
        }
        
        window.installApp = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('✅ User accepted the install prompt');
                    }
                    deferredPrompt = null;
                });
            }
        };
        
        // Detect if app is already installed
        if (window.matchMedia('(display-mode: standalone)').matches || 
            window.navigator.standalone === true) {
            console.log('📱 Running as installed PWA');
            document.body.classList.add('pwa-mode');
        }
        
        // Prevent pull-to-refresh
        document.addEventListener('touchmove', function(e) {
            if (e.target === document.documentElement) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // Handle back button in PWA
        let backPressCount = 0;
        window.addEventListener('popstate', function(e) {
            backPressCount++;
            if (backPressCount > 1) {
                if (confirm('Exit Luxe Mart?')) {
                    window.close();
                }
            }
            setTimeout(() => backPressCount = 0, 500);
        });
    </script>

                categoryName: (isActive) => ({ 
                    fontSize: '11px', 
                    fontWeight: '600', 
                    color: isActive ? '#fff' : '#B0B0B0' 
                }),
                section: { padding: '0 16px', marginBottom: '24px' },
                sectionHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' },
                sectionTitle: { fontSize: '17px', fontWeight: '700', color: '#C9A84C' },
                productGrid: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' },
                productCard: (isHovered) => ({ 
                    background: '#1A1408', 
                    borderRadius: '14px', 
                    padding: '10px', 
                    border: `1px solid ${isHovered ? '#C9A84C' : '#3A2A0C'}`, 
                    transition: 'all 0.2s', 
                    cursor: 'pointer', 
                    position: 'relative', 
                    transform: isHovered ? 'translateY(-2px)' : 'none',
                    WebkitTapHighlightColor: 'transparent'
                }),
                productImage: { width: '100%', height: '120px', objectFit: 'cover', borderRadius: '10px', marginBottom: '8px' },
                storeName: { fontSize: '10px', color: '#888', marginBottom: '3px' },
                productName: { fontSize: '12px', fontWeight: '600', marginBottom: '3px', lineHeight: '1.3', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' },
                productPrice: { fontSize: '15px', fontWeight: '700', color: '#C9A84C', marginBottom: '3px' },
                deliveryRow: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '10px', color: '#10B981', marginBottom: '6px' },
                rating: { display: 'flex', alignItems: 'center', gap: '3px', fontSize: '10px', color: '#F59E0B', marginBottom: '2px' },
                addButton: { 
                    width: '100%', 
                    padding: '7px', 
                    background: 'linear-gradient(135deg, #C9A84C 0%, #A8883A 100%)', 
                    color: '#0A0A0A', 
                    border: 'none', 
                    borderRadius: '20px', 
                    fontWeight: '700', 
                    fontSize: '11px', 
                    cursor: 'pointer', 
                    marginTop: '6px',
                    WebkitTapHighlightColor: 'transparent'
                },
                badge: (color) => ({ 
                    position: 'absolute', 
                    top: '16px', 
                    left: '16px', 
                    background: color || '#EF4444', 
                    color: '#fff', 
                    padding: '3px 7px', 
                    borderRadius: '10px', 
                    fontSize: '9px', 
                    fontWeight: '700', 
                    zIndex: 1 
                }),
                cartBar: { 
                    position: 'fixed', 
                    bottom: 0, 
                    left: 0, 
                    right: 0, 
                    maxWidth: '480px', 
                    margin: '0 auto', 
                    background: '#1A1408', 
                    borderTop: '2px solid #C9A84C', 
                    padding: '14px',
                    paddingBottom: 'calc(14px + env(safe-area-inset-bottom))'
                },
                cartPreview: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' },
                deliveryFeeRow: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: '#B0B0B0', marginBottom: '6px' },
                checkoutButton: { 
                    width: '100%', 
                    padding: '14px', 
                    background: '#25D366', 
                    color: '#fff', 
                    border: 'none', 
                    borderRadius: '25px', 
                    fontWeight: '700', 
                    fontSize: '15px', 
                    cursor: 'pointer', 
                    textDecoration: 'none', 
                    display: 'block', 
                    textAlign: 'center',
                    WebkitTapHighlightColor: 'transparent'
                },
                popup: { 
                    position: 'fixed', 
                    bottom: '100px', 
                    left: '50%', 
                    transform: 'translateX(-50%)', 
                    background: 'linear-gradient(135deg, #C9A84C 0%, #A8883A 100%)', 
                    color: '#0A0A0A', 
                    padding: '10px 20px', 
                    borderRadius: '25px', 
                    fontWeight: '700', 
                    fontSize: '13px',
                    animation: 'slideIn 0.3s ease', 
                    zIndex: 1000, 
                    whiteSpace: 'nowrap' 
                }
            };

            return (
                <div style={styles.container}>
                    {!isOnline && (
                        <div style={styles.offlineBanner}>
                            📴 You're offline • Showing cached content
                        </div>
                    )}
                    
                    <div style={styles.header}>
                        <div style={styles.headerTop}>
                            <h1 style={styles.logo}>LUXE MART</h1>
                            
                            <div style={{position: 'relative'}} ref={locationMenuRef}>
                                <button 
                                    style={styles.locationBtn}
                                    onClick={() => setShowLocationMenu(!showLocationMenu)}
                                    onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(201, 168, 76, 0.2)'}
                                    onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(201, 168, 76, 0.12)'}
                                >
                                    <span>{selectedLocation.icon}</span>
                                    <span>{selectedLocation.name}</span>
                                    <span style={{fontSize: '9px'}}>▼</span>
                                </button>
                                
                                {showLocationMenu && (
                                    <div className="location-menu">
                                        {LOCATIONS.map(loc => (
                                            <div
                                                key={loc.id}
                                                className={`location-option ${selectedLocation.id === loc.id ? 'selected' : ''}`}
                                                onClick={() => {
                                                    setSelectedLocation(loc);
                                                    setShowLocationMenu(false);
                                                    setPopup(`📍 Delivering to ${loc.name}`);
                                                    setTimeout(() => setPopup(""), 2000);
                                                }}
                                            >
                                                <span style={{fontSize: '18px'}}>{loc.icon}</span>
                                                <div>
                                                    <div className="city">{loc.name}</div>
                                                    <div style={{fontSize: '10px', color: '#888'}}>{loc.description}</div>
                                                </div>
                                                <span className="delivery-badge">{loc.deliveryTime}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <input 
                            placeholder="🔍 Search products or stores..." 
                            value={search} 
                            onChange={e => setSearch(e.target.value)} 
                            style={styles.searchInput}
                            onFocus={(e) => {
                                e.target.style.background = '#2A1F0C';
                                e.target.style.borderColor = '#C9A84C';
                            }}
                            onBlur={(e) => {
                                e.target.style.background = '#1A1408';
                                e.target.style.borderColor = '#3A2A0C';
                            }}
                        />
                    </div>

                    <div style={styles.locationBanner}>
                        <div style={{display: 'flex', alignItems: 'center', gap: '6px'}}>
                            <span style={{fontSize: '16px'}}>{selectedLocation.icon}</span>
                            <div>
                                <div style={{fontWeight: '600', fontSize: '13px', color: '#C9A84C'}}>
                                    {selectedLocation.name}
                                </div>
                                <div style={{fontSize: '10px', color: '#888'}}>
                                    {selectedLocation.description}
                                </div>
                            </div>
                        </div>
                        <div style={{textAlign: 'right'}}>
                            <div style={{fontSize: '12px', fontWeight: '600', color: '#10B981'}}>
                                🚚 {selectedLocation.deliveryTime}
                            </div>
                            <div style={{fontSize: '10px', color: '#888'}}>
                                Fee: KSh {selectedLocation.deliveryFee}
                            </div>
                        </div>
                    </div>

                    <div style={styles.categoriesScroll}>
                        {CATEGORIES.map(cat => (
                            <div
                                key={cat.id}
                                style={styles.categoryChip(selectedCat === cat.id, cat.color)}
                                onClick={() => setSelectedCat(cat.id)}
                            >
                                <span style={styles.categoryIcon}>{cat.icon}</span>
                                <span style={styles.categoryName(selectedCat === cat.id)}>{cat.name}</span>
                            </div>
                        ))}
                    </div>

                    <div style={styles.section}>
                        <div style={styles.sectionHeader}>
                            <h2 style={styles.sectionTitle}>
                                {selectedCat === 'all' ? '🛍️ All Products' : `${CATEGORIES.find(c => c.id === selectedCat)?.icon} ${CATEGORIES.find(c => c.id === selectedCat)?.name}`}
                            </h2>
                            <span style={{color: '#888', fontSize: '12px'}}>{filtered.length} items</span>
                        </div>
                        <div style={styles.productGrid}>
                            {filtered.map(p => (
                                <div
                                    key={p.id}
                                    style={styles.productCard(hoveredCard === p.id)}
                                    onMouseEnter={() => setHoveredCard(p.id)}
                                    onMouseLeave={() => setHoveredCard(null)}
                                    onTouchStart={() => setHoveredCard(p.id)}
                                    onTouchEnd={() => setHoveredCard(null)}
                                >
                                    {p.badge && <span style={styles.badge(p.badgeColor)}>{p.badge}</span>}
                                    <img src={p.img} style={styles.productImage} alt={p.name} loading="lazy" />
                                    <p style={styles.storeName}>{p.store}</p>
                                    <p style={styles.productName}>{p.name}</p>
                                    <div style={styles.rating}><span>⭐</span><span>{p.rating}</span></div>
                                    <p style={styles.productPrice}>KSh {p.price.toLocaleString()}</p>
                                    <div style={styles.deliveryRow}><span>🛵</span><span>{p.delivery}</span></div>
                                    <button onClick={() => addToCart(p)} style={styles.addButton}>+ Add to Cart</button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {cart.length > 0 && (
                        <div style={styles.cartBar}>
                            <div style={styles.cartPreview}>
                                <span>🛒 {cartCount} items</span>
                                <span style={{color: '#C9A84C', fontWeight: '700'}}>KSh {cartTotal.toLocaleString()}</span>
                            </div>
                            <div style={styles.deliveryFeeRow}>
                                <span>🚚 Delivery to {selectedLocation.name}</span>
                                <span style={{color: '#10B981'}}>KSh {selectedLocation.deliveryFee}</span>
                            </div>
                            <div style={{...styles.cartPreview, marginBottom: '12px'}}>
                                <span style={{fontWeight: '700'}}>Total</span>
                                <span style={{color: '#C9A84C', fontWeight: '800', fontSize: '17px'}}>
                                    KSh {totalWithDelivery.toLocaleString()}
                                </span>
                            </div>
                            <a href={waMsg()} target="_blank" style={styles.checkoutButton}>
                                💬 Checkout via WhatsApp
                            </a>
                        </div>
                    )}

                    {popup && <div style={styles.popup}>{popup}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LuxeMart />);
    </script>
</body>
</html>
