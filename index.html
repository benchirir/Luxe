<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE MART • Delivery in Minutes</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body { background: #0A0A0A; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 4px; }
        
        .location-dropdown {
            position: relative;
            display: inline-block;
        }
        .location-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: #1A1A1A;
            border: 1px solid #C9A84C;
            border-radius: 12px;
            padding: 8px;
            min-width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;
            z-index: 1000;
        }
        .location-option {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .location-option:hover {
            background: #2A2A2A;
        }
        .location-option.selected {
            background: rgba(201, 168, 76, 0.2);
            border-left: 3px solid #C9A84C;
        }
        .location-option .city {
            font-weight: 600;
            color: #fff;
        }
        .location-option .delivery-badge {
            font-size: 11px;
            color: #10B981;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLORS = {
            primary: '#C9A84C',
            primaryGradient: 'linear-gradient(135deg, #2A1F0C 0%, #1A1408 100%)',
            bgPrimary: '#0A0A0A',
            bgSecondary: '#111111',
            bgTertiary: '#1A1A1A',
            bgCard: '#161616',
            border: '#2A2A2A',
            textPrimary: '#FFFFFF',
            textSecondary: '#B0B0B0',
            textMuted: '#888888',
            success: '#10B981',
            warning: '#F59E0B',
            danger: '#EF4444',
            info: '#3B82F6',
            purple: '#8B5CF6',
            pink: '#EC4899',
            orange: '#F97316',
            whatsapp: '#25D366'
        };

        const WHATSAPP = "254792091769";

        const LOCATIONS = [
            { id: 'nairobi', name: 'Nairobi', icon: '🏙️', deliveryTime: '15-30 min', deliveryFee: 150, description: 'CBD, Westlands, Kilimani' },
            { id: 'eldoret', name: 'Eldoret', icon: '🌾', deliveryTime: '35-50 min', deliveryFee: 250, description: 'Town, Elgon View, Kapsoya' }
        ];

        const CATEGORIES = [
            { id: 'all', name: '🔥 All', icon: '🛍️', color: '#C9A84C' },
            { id: 'phones', name: 'Phones', icon: '📱', color: '#3B82F6' },
            { id: 'shoes', name: 'Shoes', icon: '👟', color: '#F97316' },
            { id: 'accessories', name: 'Accessories', icon: '🎧', color: '#8B5CF6' },
            { id: 'clothes', name: 'Clothes', icon: '👕', color: '#EC4899' },
            { id: 'electronics', name: 'Electronics', icon: '💻', color: '#10B981' },
            { id: 'groceries', name: 'Groceries', icon: '🛒', color: '#F59E0B' },
            { id: 'beauty', name: 'Beauty', icon: '💄', color: '#EC4899' }
        ];

        const PRODUCTS = [
            { id:1, name:"iPhone 15 Pro Max", price:185000, cat:"phones", img:"https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400&q=80", delivery:"15-20 min", badge:"NEW", badgeColor:COLORS.info, rating:4.9, store:"iStore" },
            { id:2, name:"Samsung Galaxy S24 Ultra", price:165000, cat:"phones", img:"https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=400&q=80", delivery:"20-25 min", badge:"HOT", badgeColor:COLORS.danger, rating:4.8, store:"Samsung" },
            { id:3, name:"Google Pixel 8 Pro", price:125000, cat:"phones", img:"https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=400&q=80", delivery:"15-20 min", badge:"-15%", badgeColor:COLORS.success, rating:4.7, store:"Pixel Store" },
            { id:4, name:"OnePlus 12", price:95000, cat:"phones", img:"https://images.unsplash.com/photo-1678917820864-3c25b26b4dc9?w=400&q=80", delivery:"20-25 min", badge:null, rating:4.6, store:"OnePlus" },
            { id:5, name:"Nothing Phone 2", price:65000, cat:"phones", img:"https://images.unsplash.com/photo-1684941582290-23fc2a5c26b7?w=400&q=80", delivery:"15-20 min", badge:"-20%", badgeColor:COLORS.warning, rating:4.5, store:"Nothing" },
            { id:6, name:"Xiaomi 14 Pro", price:85000, cat:"phones", img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400&q=80", delivery:"20-25 min", badge:"HOT", badgeColor:COLORS.danger, rating:4.6, store:"Xiaomi" },
            { id:21, name:"Nike Air Jordan 1", price:5900, cat:"shoes", img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&q=80", delivery:"25-30 min", badge:"TRENDING", badgeColor:COLORS.purple, rating:4.9, store:"Nike" },
            { id:22, name:"Adidas Yeezy 350", price:7000, cat:"shoes", img:"https://images.unsplash.com/photo-1607522370275-f14206abe5d3?w=400&q=80", delivery:"20-25 min", badge:"LIMITED", badgeColor:COLORS.danger, rating:4.8, store:"Adidas" },
            { id:41, name:"AirPods Pro 2", price:10700, cat:"accessories", img:"https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=400&q=80", delivery:"15-20 min", badge:"HOT", badgeColor:COLORS.danger, rating:4.9, store:"iStore" },
            { id:42, name:"Samsung Galaxy Buds2 Pro", price:8100, cat:"accessories", img:"https://images.unsplash.com/photo-1651008373003-88c7f1e2c7b2?w=400&q=80", delivery:"20-25 min", badge:"-20%", badgeColor:COLORS.success, rating:4.7, store:"Samsung" },
            { id:59, name:"Nike Tech Fleece", price:6500, cat:"clothes", img:"https://images.unsplash.com/photo-1556905055-8f358a7a47b2?w=400&q=80", delivery:"20-25 min", badge:"TRENDING", badgeColor:COLORS.purple, rating:4.7, store:"Nike" },
            { id:60, name:"Essential Hoodie", price:5500, cat:"clothes", img:"https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400&q=80", delivery:"15-20 min", badge:"-40%", badgeColor:COLORS.success, rating:4.6, store:"Essentials" },
        ];

        function LuxeMart() {
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [selectedCat, setSelectedCat] = useState('all');
            const [popup, setPopup] = useState("");
            const [hoveredCard, setHoveredCard] = useState(null);
            const [selectedLocation, setSelectedLocation] = useState(LOCATIONS[0]);
            const [showLocationMenu, setShowLocationMenu] = useState(false);
            const locationMenuRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (locationMenuRef.current && !locationMenuRef.current.contains(event.target)) {
                        setShowLocationMenu(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const filtered = PRODUCTS.filter(p => {
                const matchesCat = selectedCat === 'all' || p.cat === selectedCat;
                const matchesSearch = p.name.toLowerCase().includes(search.toLowerCase()) ||
                                    p.store.toLowerCase().includes(search.toLowerCase());
                return matchesCat && matchesSearch;
            });

            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    return ex ? prev.map(i => i.id === p.id ? {...i, qty:i.qty+1} : i)
                              : [...prev, {...p, qty:1}];
                });
                setPopup(`✅ Added to cart`);
                setTimeout(() => setPopup(""), 2000);
            };

            const cartTotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
            const cartCount = cart.reduce((s,i) => s + i.qty, 0);
            const totalWithDelivery = cartTotal + (cart.length > 0 ? selectedLocation.deliveryFee : 0);

            const waMsg = () => {
                if (!cart.length) return `https://wa.me/${WHATSAPP}`;
                const lines = cart.map(i => `• ${i.qty}x ${i.name} — KSh ${(i.price*i.qty).toLocaleString()}`).join("\n");
                return `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(
`🛍️ *LUXE MART ORDER*

📍 *Location:* ${selectedLocation.name}
🚚 *Delivery Fee:* KSh ${selectedLocation.deliveryFee}

${lines}

━━━━━━━━━━━━━━━━
💰 *Subtotal: KSh ${cartTotal.toLocaleString()}*
🚚 *Delivery: KSh ${selectedLocation.deliveryFee}*
💳 *TOTAL: KSh ${totalWithDelivery.toLocaleString()}*

⏱️ *Estimated Delivery: ${selectedLocation.deliveryTime}*

💳 *Payment: M-PESA on Delivery*

📍 Please confirm my order`
                )}`;
            };

            const styles = {
                container: { background: COLORS.bgPrimary, color: COLORS.textPrimary, minHeight: '100vh', maxWidth: '480px', margin: '0 auto', position: 'relative', paddingBottom: cart.length > 0 ? '120px' : '20px' },
                
                // HEADER - Much more compact and darker
                header: { 
                    background: 'linear-gradient(135deg, #1A1408 0%, #0D0A05 100%)', 
                    padding: '12px 16px 16px', 
                    borderBottomLeftRadius: '20px', 
                    borderBottomRightRadius: '20px', 
                    position: 'sticky', 
                    top: 0, 
                    zIndex: 100,
                    borderBottom: '1px solid #C9A84C'
                },
                headerTop: { 
                    display: 'flex', 
                    justifyContent: 'space-between', 
                    alignItems: 'center', 
                    marginBottom: '12px' 
                },
                logo: { 
                    fontSize: '22px', 
                    fontWeight: '800', 
                    color: '#C9A84C',
                    letterSpacing: '-0.5px',
                    textShadow: '0 2px 4px rgba(0,0,0,0.3)'
                },
                locationBtn: { 
                    display: 'flex', 
                    alignItems: 'center', 
                    gap: '6px', 
                    background: 'rgba(201, 168, 76, 0.12)', 
                    padding: '6px 12px', 
                    borderRadius: '20px', 
                    color: '#C9A84C', 
                    fontSize: '12px', 
                    fontWeight: '600',
                    cursor: 'pointer',
                    border: '1px solid rgba(201, 168, 76, 0.2)',
                    transition: 'all 0.2s'
                },
                
                // SEARCH BAR - Smaller and more compact
                searchInput: { 
                    width: '100%', 
                    padding: '10px 14px', 
                    background: '#1A1408', 
                    border: '1px solid #3A2A0C', 
                    borderRadius: '25px', 
                    fontSize: '14px', 
                    outline: 'none',
                    color: '#fff',
                    transition: 'all 0.2s'
                },
                
                locationBanner: {
                    background: 'rgba(26, 20, 8, 0.8)',
                    margin: '8px 16px',
                    padding: '8px 14px',
                    borderRadius: '20px',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'space-between',
                    border: '1px solid rgba(201, 168, 76, 0.2)'
                },
                
                categoriesScroll: { 
                    display: 'flex', 
                    gap: '10px', 
                    overflowX: 'auto', 
                    padding: '12px 16px', 
                    marginTop: '-5px', 
                    position: 'relative', 
                    zIndex: 10 
                },
                categoryChip: (isActive, color) => ({ 
                    display: 'flex', 
                    flexDirection: 'column', 
                    alignItems: 'center', 
                    gap: '4px', 
                    padding: '10px 14px', 
                    background: isActive ? color : '#1A1408', 
                    borderRadius: '14px', 
                    border: isActive ? 'none' : `1px solid #3A2A0C`, 
                    cursor: 'pointer', 
                    transition: 'all 0.2s', 
                    minWidth: '70px',
                    fontSize: '12px'
                }),
                categoryIcon: { fontSize: '20px' },
                categoryName: (isActive) => ({ 
                    fontSize: '11px', 
                    fontWeight: '600', 
                    color: isActive ? '#fff' : '#B0B0B0' 
                }),
                
                section: { padding: '0 16px', marginBottom: '24px' },
                sectionHeader: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' },
                sectionTitle: { fontSize: '17px', fontWeight: '700', color: '#C9A84C' },
                productGrid: { display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' },
                productCard: (isHovered) => ({ 
                    background: '#1A1408', 
                    borderRadius: '14px', 
                    padding: '10px', 
                    border: `1px solid ${isHovered ? '#C9A84C' : '#3A2A0C'}`, 
                    transition: 'all 0.2s', 
                    cursor: 'pointer', 
                    position: 'relative', 
                    transform: isHovered ? 'translateY(-2px)' : 'none' 
                }),
                productImage: { width: '100%', height: '120px', objectFit: 'cover', borderRadius: '10px', marginBottom: '8px' },
                storeName: { fontSize: '10px', color: '#888', marginBottom: '3px' },
                productName: { fontSize: '12px', fontWeight: '600', marginBottom: '3px', lineHeight: '1.3', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' },
                productPrice: { fontSize: '15px', fontWeight: '700', color: '#C9A84C', marginBottom: '3px' },
                deliveryRow: { display: 'flex', alignItems: 'center', gap: '4px', fontSize: '10px', color: '#10B981', marginBottom: '6px' },
                rating: { display: 'flex', alignItems: 'center', gap: '3px', fontSize: '10px', color: '#F59E0B', marginBottom: '2px' },
                addButton: { 
                    width: '100%', 
                    padding: '7px', 
                    background: 'linear-gradient(135deg, #C9A84C 0%, #A8883A 100%)', 
                    color: '#0A0A0A', 
                    border: 'none', 
                    borderRadius: '20px', 
                    fontWeight: '700', 
                    fontSize: '11px', 
                    cursor: 'pointer', 
                    marginTop: '6px' 
                },
                badge: (color) => ({ 
                    position: 'absolute', 
                    top: '16px', 
                    left: '16px', 
                    background: color || '#EF4444', 
                    color: '#fff', 
                    padding: '3px 7px', 
                    borderRadius: '10px', 
                    fontSize: '9px', 
                    fontWeight: '700', 
                    zIndex: 1 
                }),
                
                cartBar: { 
                    position: 'fixed', 
                    bottom: 0, 
                    left: 0, 
                    right: 0, 
                    maxWidth: '480px', 
                    margin: '0 auto', 
                    background: '#1A1408', 
                    borderTop: '2px solid #C9A84C', 
                    padding: '14px' 
                },
                cartPreview: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' },
                deliveryFeeRow: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: '#B0B0B0', marginBottom: '6px' },
                checkoutButton: { 
                    width: '100%', 
                    padding: '14px', 
                    background: '#25D366', 
                    color: '#fff', 
                    border: 'none', 
                    borderRadius: '25px', 
                    fontWeight: '700', 
                    fontSize: '15px', 
                    cursor: 'pointer', 
                    textDecoration: 'none', 
                    display: 'block', 
                    textAlign: 'center' 
                },
                popup: { 
                    position: 'fixed', 
                    bottom: '100px', 
                    left: '50%', 
                    transform: 'translateX(-50%)', 
                    background: 'linear-gradient(135deg, #C9A84C 0%, #A8883A 100%)', 
                    color: '#0A0A0A', 
                    padding: '10px 20px', 
                    borderRadius: '25px', 
                    fontWeight: '700', 
                    fontSize: '13px',
                    animation: 'slideIn 0.3s ease', 
                    zIndex: 1000, 
                    whiteSpace: 'nowrap' 
                }
            };

            return (
                <div style={styles.container}>
                    {/* COMPACT DARK HEADER */}
                    <div style={styles.header}>
                        <div style={styles.headerTop}>
                            <h1 style={styles.logo}>LUXE MART</h1>
                            
                            <div style={{position: 'relative'}} ref={locationMenuRef}>
                                <button 
                                    style={styles.locationBtn}
                                    onClick={() => setShowLocationMenu(!showLocationMenu)}
                                    onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(201, 168, 76, 0.2)'}
                                    onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(201, 168, 76, 0.12)'}
                                >
                                    <span>{selectedLocation.icon}</span>
                                    <span>{selectedLocation.name}</span>
                                    <span style={{fontSize: '9px'}}>▼</span>
                                </button>
                                
                                {showLocationMenu && (
                                    <div className="location-menu">
                                        {LOCATIONS.map(loc => (
                                            <div
                                                key={loc.id}
                                                className={`location-option ${selectedLocation.id === loc.id ? 'selected' : ''}`}
                                                onClick={() => {
                                                    setSelectedLocation(loc);
                                                    setShowLocationMenu(false);
                                                    setPopup(`📍 Delivering to ${loc.name}`);
                                                    setTimeout(() => setPopup(""), 2000);
                                                }}
                                            >
                                                <span style={{fontSize: '18px'}}>{loc.icon}</span>
                                                <div>
                                                    <div className="city">{loc.name}</div>
                                                    <div style={{fontSize: '10px', color: '#888'}}>{loc.description}</div>
                                                </div>
                                                <span className="delivery-badge">{loc.deliveryTime}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <input 
                            placeholder="🔍 Search products or stores..." 
                            value={search} 
                            onChange={e => setSearch(e.target.value)} 
                            style={styles.searchInput}
                            onFocus={(e) => {
                                e.target.style.background = '#2A1F0C';
                                e.target.style.borderColor = '#C9A84C';
                            }}
                            onBlur={(e) => {
                                e.target.style.background = '#1A1408';
                                e.target.style.borderColor = '#3A2A0C';
                            }}
                        />
                    </div>

                    {/* LOCATION BANNER */}
                    <div style={styles.locationBanner}>
                        <div style={{display: 'flex', alignItems: 'center', gap: '6px'}}>
                            <span style={{fontSize: '16px'}}>{selectedLocation.icon}</span>
                            <div>
                                <div style={{fontWeight: '600', fontSize: '13px', color: '#C9A84C'}}>
                                    {selectedLocation.name}
                                </div>
                                <div style={{fontSize: '10px', color: '#888'}}>
                                    {selectedLocation.description}
                                </div>
                            </div>
                        </div>
                        <div style={{textAlign: 'right'}}>
                            <div style={{fontSize: '12px', fontWeight: '600', color: '#10B981'}}>
                                🚚 {selectedLocation.deliveryTime}
                            </div>
                            <div style={{fontSize: '10px', color: '#888'}}>
                                Fee: KSh {selectedLocation.deliveryFee}
                            </div>
                        </div>
                    </div>

                    {/* CATEGORIES */}
                    <div style={styles.categoriesScroll}>
                        {CATEGORIES.map(cat => (
                            <div
                                key={cat.id}
                                style={styles.categoryChip(selectedCat === cat.id, cat.color)}
                                onClick={() => setSelectedCat(cat.id)}
                            >
                                <span style={styles.categoryIcon}>{cat.icon}</span>
                                <span style={styles.categoryName(selectedCat === cat.id)}>{cat.name}</span>
                            </div>
                        ))}
                    </div>

                    {/* PRODUCTS */}
                    <div style={styles.section}>
                        <div style={styles.sectionHeader}>
                            <h2 style={styles.sectionTitle}>
                                {selectedCat === 'all' ? '🛍️ All Products' : `${CATEGORIES.find(c => c.id === selectedCat)?.icon} ${CATEGORIES.find(c => c.id === selectedCat)?.name}`}
                            </h2>
                            <span style={{color: '#888', fontSize: '12px'}}>{filtered.length} items</span>
                        </div>
                        <div style={styles.productGrid}>
                            {filtered.map(p => (
                                <div
                                    key={p.id}
                                    style={styles.productCard(hoveredCard === p.id)}
                                    onMouseEnter={() => setHoveredCard(p.id)}
                                    onMouseLeave={() => setHoveredCard(null)}
                                >
                                    {p.badge && <span style={styles.badge(p.badgeColor)}>{p.badge}</span>}
                                    <img src={p.img} style={styles.productImage} alt={p.name} />
                                    <p style={styles.storeName}>{p.store}</p>
                                    <p style={styles.productName}>{p.name}</p>
                                    <div style={styles.rating}><span>⭐</span><span>{p.rating}</span></div>
                                    <p style={styles.productPrice}>KSh {p.price.toLocaleString()}</p>
                                    <div style={styles.deliveryRow}><span>🛵</span><span>{p.delivery}</span></div>
                                    <button onClick={() => addToCart(p)} style={styles.addButton}>+ Add to Cart</button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* CART BAR */}
                    {cart.length > 0 && (
                        <div style={styles.cartBar}>
                            <div style={styles.cartPreview}>
                                <span>🛒 {cartCount} items</span>
                                <span style={{color: '#C9A84C', fontWeight: '700'}}>KSh {cartTotal.toLocaleString()}</span>
                            </div>
                            <div style={styles.deliveryFeeRow}>
                                <span>🚚 Delivery to {selectedLocation.name}</span>
                                <span style={{color: '#10B981'}}>KSh {selectedLocation.deliveryFee}</span>
                            </div>
                            <div style={{...styles.cartPreview, marginBottom: '12px'}}>
                                <span style={{fontWeight: '700'}}>Total</span>
                                <span style={{color: '#C9A84C', fontWeight: '800', fontSize: '17px'}}>
                                    KSh {totalWithDelivery.toLocaleString()}
                                </span>
                            </div>
                            <a href={waMsg()} target="_blank" style={styles.checkoutButton}>
                                💬 Checkout via WhatsApp
                            </a>
                        </div>
                    )}

                    {popup && <div style={styles.popup}>{popup}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LuxeMart />);
    </script>
</body>
    </html>
